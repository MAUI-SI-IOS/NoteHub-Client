<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>NoteHub - Edit Note</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary-fixed": "#ffe088",
              "on-secondary-fixed": "#360f00",
              "on-primary-fixed": "#022100",
              "on-error": "#690005",
              "surface-container-high": "#192e22",
              "on-primary-container": "#719d62",
              "surface-tint": "#a4d393",
              "outline-variant": "#424843",
              "surface": "#03170d",
              "secondary": "#ffb596",
              "tertiary-fixed-dim": "#e9c349",
              "on-secondary-container": "#fd9d71",
              "on-primary-fixed-variant": "#28501e",
              "on-tertiary": "#3c2f00",
              "tertiary-container": "#cba72f",
              "inverse-surface": "#d0e9d6",
              "surface-variant": "#24392d",
              "on-tertiary-container": "#4e3d00",
              "primary": "#a4d393",
              "background": "#03170d",
              "secondary-fixed": "#ffdbcd",
              "on-background": "#d0e9d6",
              "primary-container": "#0a3204",
              "surface-container-highest": "#24392d",
              "error-container": "#93000a",
              "on-surface-variant": "#c2c8c2",
              "on-surface": "#d0e9d6",
              "on-tertiary-fixed-variant": "#574500",
              "on-secondary-fixed-variant": "#76320f",
              "surface-container-lowest": "#001208",
              "error": "#ffb4ab",
              "inverse-on-surface": "#203529",
              "on-primary": "#113809",
              "on-secondary": "#581e00",
              "surface-container-low": "#0a2014",
              "surface-dim": "#03170d",
              "surface-bright": "#283e31",
              "primary-fixed": "#c0f0ad",
              "outline": "#8c928c",
              "secondary-fixed-dim": "#ffb596",
              "on-error-container": "#ffdad6",
              "inverse-primary": "#3f6833",
              "surface-container": "#0f2418",
              "tertiary": "#e9c349",
              "secondary-container": "#76320f",
              "primary-fixed-dim": "#a4d393",
              "on-tertiary-fixed": "#241a00"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Manrope"],
              "label": ["Manrope"],
              "mono": ["JetBrains Mono"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(25, 46, 34, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #424843; border-radius: 10px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-secondary/30 min-h-screen">
<!-- Top Navigation Bar -->
<header class="bg-[#1A2F23] dark:bg-[#0A1208] bg-gradient-to-b from-[#1A2F23] to-transparent flex justify-between items-center px-6 py-4 w-full sticky top-0 z-50">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#a4d393] hover:bg-[#a4d393]/10 transition-colors cursor-pointer p-2 rounded-full active:scale-95 duration-200">arrow_back</span>
<h1 class="text-[#f0f2ee] font-bold tracking-tight text-xl font-headline">NoteHub</h1>
</div>
<div class="flex items-center gap-2">
<!-- Mode Toggle: Read/Edit -->
<div class="flex bg-surface-container-low rounded-full p-1 self-center mr-4">
<button class="px-4 py-1.5 text-xs font-bold rounded-full bg-gradient-to-br from-[#e9c349] to-[#4e3d00] text-[#241a00] shadow-lg transition-all">Read</button>
<button class="px-4 py-1.5 text-xs font-bold rounded-full text-on-surface-variant/60 hover:text-on-surface transition-all">Edit</button>
</div>
<span class="material-symbols-outlined text-[#a4d393] hover:bg-[#a4d393]/10 transition-colors cursor-pointer p-2 rounded-full active:scale-95 duration-200">share</span>
<span class="material-symbols-outlined text-[#a4d393] hover:bg-[#a4d393]/10 transition-colors cursor-pointer p-2 rounded-full active:scale-95 duration-200">more_vert</span>
</div>
</header>
<main class="max-w-4xl mx-auto px-6 pb-40 pt-4">
<!-- Formatting Toolbar -->
<section class="flex flex-wrap items-center gap-1 mb-10 p-2 glass-panel rounded-xl sticky top-20 z-40 border border-outline-variant/10">
<button class="p-2 hover:bg-surface-container-highest rounded-lg text-on-surface-variant transition-colors" title="Headline 1"><span class="material-symbols-outlined text-sm">format_h1</span></button>
<button class="p-2 hover:bg-surface-container-highest rounded-lg text-on-surface-variant transition-colors" title="Headline 2"><span class="material-symbols-outlined text-sm">format_h2</span></button>
<div class="w-[1px] h-6 bg-outline-variant/20 mx-1"></div>
<button class="p-2 hover:bg-surface-container-highest rounded-lg text-on-surface-variant transition-colors font-bold" title="Bold">B</button>
<button class="p-2 hover:bg-surface-container-highest rounded-lg text-on-surface-variant transition-colors italic" title="Italic">I</button>
<button class="p-2 hover:bg-surface-container-highest rounded-lg text-on-surface-variant transition-colors underline" title="Underline">U</button>
<button class="p-2 hover:bg-surface-container-highest rounded-lg text-on-surface-variant transition-colors line-through" title="Strikethrough">S</button>
<div class="w-[1px] h-6 bg-outline-variant/20 mx-1"></div>
<button class="p-2 hover:bg-surface-container-highest rounded-lg text-on-surface-variant transition-colors" title="Bullet List"><span class="material-symbols-outlined text-sm">format_list_bulleted</span></button>
<button class="p-2 hover:bg-surface-container-highest rounded-lg text-on-surface-variant transition-colors" title="Numbered List"><span class="material-symbols-outlined text-sm">format_list_numbered</span></button>
<div class="w-[1px] h-6 bg-outline-variant/20 mx-1"></div>
<button class="p-2 hover:bg-surface-container-highest rounded-lg text-on-surface-variant transition-colors" title="Link"><span class="material-symbols-outlined text-sm">link</span></button>
<button class="p-2 hover:bg-surface-container-highest rounded-lg text-on-surface-variant transition-colors" title="Image"><span class="material-symbols-outlined text-sm">image</span></button>
<button class="p-2 hover:bg-surface-container-highest rounded-lg text-on-surface-variant transition-colors ml-auto" title="Undo"><span class="material-symbols-outlined text-sm">undo</span></button>
<button class="p-2 hover:bg-surface-container-highest rounded-lg text-on-surface-variant transition-colors" title="Redo"><span class="material-symbols-outlined text-sm">redo</span></button>
</section>
<!-- Editor Title -->
<div class="mb-6">
<textarea class="w-full bg-transparent border-none focus:ring-0 text-4xl font-headline font-extrabold text-on-surface placeholder:text-outline/30 resize-none overflow-hidden h-auto py-0 tracking-tight" placeholder="# Title" rows="1">Reflections on the Whispering Valley</textarea>
</div>
<!-- Metadata / Details Section -->
<div class="flex flex-wrap items-center gap-4 mb-10 pb-6 border-b border-outline-variant/10">
<div class="flex items-center gap-2 bg-surface-container px-3 py-1.5 rounded-full border border-outline-variant/5">
<span class="material-symbols-outlined text-[18px] text-tertiary">calendar_today</span>
<span class="text-xs font-label text-on-surface-variant">May 24, 2024</span>
</div>
<div class="flex items-center gap-2 bg-secondary-container/40 px-3 py-1.5 rounded-full">
<span class="material-symbols-outlined text-[18px] text-secondary">label</span>
<span class="text-xs font-label text-secondary">Wilderness</span>
</div>
<div class="flex items-center gap-2 bg-surface-container px-3 py-1.5 rounded-full border border-outline-variant/5">
<span class="material-symbols-outlined text-[18px] text-primary">location_on</span>
<span class="text-xs font-label text-on-surface-variant">Oregon Trails</span>
</div>
</div>
<!-- Main Content Area (Monospace Markdown) -->
<article class="space-y-6">
<textarea class="w-full bg-transparent border-none focus:ring-0 text-lg font-mono leading-relaxed text-on-surface-variant placeholder:text-outline/20 resize-none min-h-[500px]" spellcheck="false">## The Awakening
The fog clings to the jagged edges of the peaks like a [memory of the ocean](https://notehub.io/archive/valley-fog). As I sit here, the air is thick with the scent of damp pine and ancient earth.

&gt; "The valley does not speak in words, but in the rustle of leaves."

### Observations
- The **mossy sienna** accents on the rocks are more vibrant after the rain.
- Sunlight filters through the canopy in sharp, golden needles.
- Birds are quiet today; only the creek provides the soundtrack.

I need to revisit the [Eastern Ridge](geo:44.5,-122.1) before the sun sets. The light there is said to be transformative.

---

*Last edited 2 minutes ago*</textarea>
</article>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 w-full z-50 bg-[#1A2F23]/80 backdrop-blur-xl border-t border-[#f0f2ee]/10 shadow-[0px_-10px_30px_rgba(0,18,8,0.4)]">
<div class="flex justify-around items-center px-4 pb-6 pt-3 w-full max-w-4xl mx-auto">
<!-- Notes (Active) -->
<a class="flex flex-col items-center justify-center bg-gradient-to-br from-[#e9c349] to-[#4e3d00] text-[#241a00] rounded-xl px-4 py-1.5 active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">description</span>
<span class="font-['Manrope'] text-[11px] font-medium tracking-wide">Notes</span>
</a>
<!-- Search -->
<a class="flex flex-col items-center justify-center text-[#f0f2ee]/60 px-4 py-1.5 hover:text-[#a4d393] transition-all active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined mb-1">search</span>
<span class="font-['Manrope'] text-[11px] font-medium tracking-wide">Search</span>
</a>
<!-- Drafts -->
<a class="flex flex-col items-center justify-center text-[#f0f2ee]/60 px-4 py-1.5 hover:text-[#a4d393] transition-all active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined mb-1">edit_note</span>
<span class="font-['Manrope'] text-[11px] font-medium tracking-wide">Drafts</span>
</a>
<!-- Settings -->
<a class="flex flex-col items-center justify-center text-[#f0f2ee]/60 px-4 py-1.5 hover:text-[#a4d393] transition-all active:scale-90 duration-150" href="#">
<span class="material-symbols-outlined mb-1">settings</span>
<span class="font-['Manrope'] text-[11px] font-medium tracking-wide">Settings</span>
</a>
</div>
</nav>
<!-- Floating Action Button (FAB) - Local Logic: Save -->
<!-- Floating Atmosphere Accents -->
<div class="fixed top-[20%] right-[-5%] w-64 h-64 bg-primary/5 blur-[120px] rounded-full pointer-events-none"></div>
<div class="fixed bottom-[10%] left-[-10%] w-96 h-96 bg-tertiary/5 blur-[140px] rounded-full pointer-events-none"></div>
</body></html>
