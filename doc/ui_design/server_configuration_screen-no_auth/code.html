</div>
</header>
<!-- Main Content: Refined like SCREEN_12 -->
<main class="flex-grow flex items-center justify-center px-6">
<div class="w-full max-w-md bg-surface-container-high rounded-3xl p-8 md:p-12 shadow-2xl relative overflow-hidden">
<!-- Subtle Glow Decoration -->
<div class="absolute -top-12 -right-12 w-48 h-48 bg-primary/5 rounded-full blur-3xl"></div>
<div class="relative z-10">
<!-- Simplified Header -->
<div class="mb-12 text-center md:text-left">
<h2 class="font-headline text-3xl font-extrabold text-on-surface mb-3 tracking-tight">Connect to Vault</h2>
<p class="font-body text-on-surface-variant text-sm leading-relaxed">Enter your private server address to begin synchronization.</p>
</div>
<!-- Focused Input Field -->
<form class="space-y-10">
<div class="space-y-3">
<label class="block text-[10px] uppercase tracking-[0.2em] font-bold text-tertiary ml-1" for="server_url">Server URL</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline-variant text-lg" data-icon="dns">dns</span>
<input class="w-full bg-surface-container-low border-none rounded-2xl py-5 pl-12 pr-4 text-on-surface placeholder:text-on-surface-variant/30 focus:ring-2 focus:ring-primary/20 transition-all outline-none font-headline text-lg" id="server_url" placeholder="https://sanctuary.local:8080" type="text"/>
</div>
</div>
<!-- Prominent Action Button -->
<button class="w-full py-5 px-6 bg-gradient-to-br from-tertiary to-tertiary-container text-on-tertiary font-headline font-extrabold text-lg rounded-2xl shadow-xl shadow-tertiary/10 hover:brightness-110 hover:shadow-tertiary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-3 group">
                    Continue
                    <span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform" data-icon="east">east</span>
</button>
</form>
</div>
</div>
</main>

<div class="absolute -bottom-1/4 -right-1/4 w-[600px] h-[600px] bg-primary/5 rounded-full blur-[120px]"></div>
